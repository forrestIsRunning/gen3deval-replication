<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gen3DEval POC</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header>
      <div>
        <h1>Gen3DEval 工作台</h1>
        <p>最小可运行的 3D 几何、渲染与 VLM 评分界面。</p>
      </div>
    </header>

    <main>
      <section class="panel controls">
        <label>
          Manifest
          <select id="manifest"></select>
        </label>
        <label>
          资产
          <select id="asset"></select>
        </label>
        <label>
          VLM
          <select id="model"></select>
        </label>
        <button id="renderAsset">Render Selected</button>
        <button id="run">Run Selected VLM</button>
        <button id="geometryRun">Geometry</button>
      </section>
      <div id="manifestHelp" class="manifest-help"></div>
      <section id="contextBox" class="context-box"></section>

      <section class="grid">
        <div class="panel viewer">
          <div class="section-head">
            <h2>3D 预览</h2>
            <span>GLB 原资产</span>
          </div>
          <model-viewer
            id="viewer"
            camera-controls
            auto-rotate
            shadow-intensity="0.8"
            exposure="1"
          ></model-viewer>
        </div>

        <div class="panel">
          <h2>多视角渲染</h2>
          <div id="viewGrid" class="view-grid"></div>
        </div>
      </section>

      <section class="grid">
        <div class="panel chart-panel">
          <div class="panel-head">
            <div>
              <h2 id="scoreTitle">VLM 多维评分</h2>
              <p id="scoreSubtitle">按当前 manifest 和模型统计，0-10 分。</p>
            </div>
          </div>
          <div class="chart-wrap score-chart-wrap">
            <canvas id="chart"></canvas>
          </div>
        </div>
        <div class="panel chart-panel">
          <div class="panel-head">
            <div>
              <h2>几何分布</h2>
              <p id="geometrySubtitle">按面数区间聚合当前 manifest，橙色表示当前资产所在区间。</p>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="geometryChart"></canvas>
          </div>
        </div>
      </section>

      <section class="grid">
        <div class="panel">
          <h2>渲染验证</h2>
          <div id="renderSummary" class="summary"></div>
          <div class="table-wrap compact">
            <table>
              <thead>
                <tr>
                  <th>uid</th>
                  <th>RGB</th>
                  <th>Normal</th>
                  <th>Complete</th>
                  <th>Quality</th>
                </tr>
              </thead>
              <tbody id="renderRows"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>可计算几何指标</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>资产 ID</th>
                <th>类别</th>
                <th>面数</th>
                <th>顶点数</th>
                <th>封闭</th>
                <th>朝向一致</th>
                <th>长宽比</th>
                <th>退化面</th>
                <th>表面积</th>
              </tr>
            </thead>
            <tbody id="geometryRows"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>样本结果</h2>
        <div id="cards" class="cards"></div>
      </section>

      <section class="panel logs">
        <h2>运行日志</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
